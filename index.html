<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KROK 1: Expert 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        .krok-marker { border-left: 4px solid #ef4444; padding-left: 0.5rem; margin: 1rem 0; font-weight: bold; color: #ef4444; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .quiz-option { @apply w-full text-left p-4 rounded-xl border border-slate-200 hover:bg-slate-50 transition-all font-medium mb-2; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold cursor-pointer" onclick="goHome()">KROK 1: Expert 2026</h1>
            <div class="text-sm opacity-90">Студент: Іван</div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        
        <div id="screen-subjects" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>

        <div id="screen-topics" class="hidden fade-in">
            <button onclick="goHome()" class="text-blue-600 mb-4 font-medium">← Назад</button>
            <h2 id="subject-title" class="text-2xl font-bold mb-6 text-slate-800"></h2>
            <div id="topics-container" class="grid gap-3"></div>
        </div>

        <div id="screen-study" class="hidden fade-in">
            <button onclick="backToTopics()" class="text-blue-600 mb-4 font-medium">← До тем</button>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex border-b bg-slate-50/50">
                    <button id="tab-study" onclick="switchTab('study')" class="flex-1 py-4 font-semibold text-slate-500 tab-active">Навчання</button>
                    <button id="tab-quiz" onclick="switchTab('quiz')" class="flex-1 py-4 font-semibold text-slate-500">Тестування</button>
                </div>

                <div class="p-6">
                    <div id="content-study">
                        <div id="study-material" class="prose max-w-none text-slate-700"></div>
                    </div>

                    <div id="content-quiz" class="hidden">
                        <div id="quiz-intro" class="text-center py-12">
                            <h3 class="text-xl font-bold mb-4">Перевірка знань</h3>
                            <button onclick="startQuiz()" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">Почати тест (150 питань)</button>
                        </div>

                        <div id="quiz-game" class="hidden">
                            <div class="flex justify-between mb-6 font-mono text-sm text-slate-500">
                                <span id="quiz-progress"></span>
                                <span id="quiz-timer"></span>
                            </div>
                            <div id="question-text" class="text-xl font-semibold mb-8 text-slate-800 leading-relaxed"></div>
                            <div id="options-container" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
