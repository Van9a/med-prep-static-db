<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KROK 1: Expert 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" 
            onload="renderMathInElement(document.body, {delimiters: [{left: '$', right: '$', display: false}]});">
    </script>

    <style>
        .krok-marker { @apply font-bold text-red-600 border-l-4 border-red-600 pl-2 my-2; }
        .formula-box { @apply bg-slate-50 p-4 rounded-xl border border-slate-200 my-4 font-mono; }
        .tab-active { @apply border-b-2 border-blue-600 text-blue-600; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">KROK 1: Expert 2026</h1>
            <div id="user-info" class="text-sm opacity-90 font-medium">Студент: Іван</div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        <button onclick="window.location.reload()" class="mb-6 flex items-center text-blue-600 hover:text-blue-800 transition-colors font-medium">
            <span class="mr-2">←</span> До тем
        </button>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="flex border-b border-slate-200 bg-slate-50/50">
                <button id="tab-study" class="flex-1 py-4 font-semibold text-slate-500 hover:text-slate-700 transition-all tab-active">
                    Навчання (Конспект)
                </button>
                <button id="tab-quiz" class="flex-1 py-4 font-semibold text-slate-500 hover:text-slate-700 transition-all">
                    Тестування (150 питань)
                </button>
            </div>

            <div class="p-6 min-h-[400px]">
                <div id="dynamic-content">
                    <div class="flex items-center justify-center h-64 text-slate-400">
                        Завантаження матеріалів...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 py-8 text-center text-slate-400 text-sm border-t border-slate-200">
        <p>© 2026 Medical Prep Tool • Made for KROK 1 Success</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
